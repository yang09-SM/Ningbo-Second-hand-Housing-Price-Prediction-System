<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宁波二手房价格预测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">

    </nav>

    <div class="max-w-7xl mx-auto px-4 py-6">

        <div id="list-panel">

                        <input type="text" id="search-input" placeholder="搜索小区或区域..."

                    </div>
                    <div class="min-w-[150px]">

                        搜索
                    </button>
                    <button onclick="openModal()" class="px-4 py-2 bg-green-500 text-white rounded-md hover:bg-green-600">

            </div>

            <div id="houses-container" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">

            <div id="pagination" class="flex justify-center items-center space-x-2 mt-6">

        </div>

        <div id="predict-panel" class="hidden">
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-6">二手房价格预测</h2>
                
                <form id="predict-form" class="space-y-6">
                    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">

                        </div>
                        <div>

                        <div>

                            <input type="number" id="室数" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">厅数</label>

                            <input type="number" id="卫数" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">区</label>
                            <select id="区" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>

                            <select id="板块" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                        <div>

                            <select id="楼层位置" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>

                        <div>

                            <select id="房屋朝向" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                        <div>

                            <select id="建筑类型" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                        </div>

                        </div>
                        <div>

                            <select id="交易权属" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                        <div>

                        <div>

                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">产权所属</label>
                            <select id="产权所属" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                        </div>
                    </div>
                    
                    <div class="flex justify-center">
                        <button type="submit" id="predict-btn" class="px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-medium rounded-lg hover:from-blue-600 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                            预测价格
                        </button>
                    </div>
                </form>

                <div id="prediction-result" class="hidden mt-8 p-6 bg-gradient-to-r from-green-50 to-blue-50 rounded-lg border border-green-200">
                    <h3 class="text-lg font-bold text-gray-800 mb-2">预测结果</h3>
                    <p class="text-3xl font-bold text-green-600" id="predicted-price"></p>
                    <p class="text-sm text-gray-600 mt-2" id="model-used"></p>

            </div>

    </div>

    <div id="house-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

                <form id="house-form" class="space-y-4">

                        </div>
                        <div>

                            <input type="text" id="form-小区名称" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <div>

                            <input type="text" id="form-房屋户型" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">建筑面积 *</label>
                            <input type="text" id="form-建筑面积" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">所在楼层</label>
                            <input type="text" id="form-所在楼层" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>

                            <input type="text" id="form-户型结构" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>

                            <input type="text" id="form-套内面积" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">建筑类型</label>
                            <select id="form-建筑类型" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">房屋朝向</label>
                            <select id="form-房屋朝向" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">建筑结构</label>
                            <select id="form-建筑结构" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">装修情况</label>
                            <select id="form-装修情况" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>

                        </div>
                        <div>

                            <input type="text" id="form-梯户比例" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">配备电梯</label>
                            <select id="form-配备电梯" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">区</label>
                            <select id="form-区" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">板块</label>
                            <select id="form-板块" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">请选择</option>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">楼层位置</label>
                            <select id="form-楼层位置" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">

                            <label class="block text-sm font-medium text-gray-700 mb-1">室数</label>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">厅数</label>

    <script>
        let currentPage = 1;
        let featureOptions = {};
        let editingHouseId = null;

        async function loadDistricts() {
            try {
                const response = await fetch('/api/districts');
                const districts = await response.json();
                const select = document.getElementById('district-select');
                districts.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d;
                    option.textContent = d;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载区域失败:', error);
            }
        }

        async function loadFeatureOptions() {
            try {
                const response = await fetch('/api/feature-options');
                featureOptions = await response.json();
                
                for (const [feature, options] of Object.entries(featureOptions)) {
                    const select = document.getElementById(feature);
                    if (select) {
                        options.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.textContent = opt;
                            select.appendChild(option);
                        });
                    }
                }
            } catch (error) {
                console.error('加载特征选项失败:', error);
            }
        }

        async function loadHouses(page = 1) {
            currentPage = page;
            const search = document.getElementById('search-input').value;
            const district = document.getElementById('district-select').value;
            
            const container = document.getElementById('houses-container');
            container.innerHTML = '<div class="col-span-full text-center py-8"><span class="loading"></span></div>';
            
            try {
                let url = `/api/houses?page=${page}`;
                if (search) url += `&search=${encodeURIComponent(search)}`;
                if (district) url += `&district=${encodeURIComponent(district)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.houses.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">暂无房源数据</div>';
                } else {
                    container.innerHTML = data.houses.map(house => `
                        <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover transition-all duration-300">
                            <div class="p-4">
                                <h3 class="text-lg font-bold text-gray-800 mb-2">${house['小区名称'] || '未知小区'}</h3>
                                <div class="text-2xl font-bold text-red-500 mb-2">${house['总价'] || '待定'}</div>
                                <p class="text-sm text-gray-500 mb-3">${house['单价'] || ''} · ${house['建筑面积'] || ''}</p>
                                <div class="flex flex-wrap gap-2 text-sm mb-4">
                                    <span class="px-2 py-1 bg-gray-100 rounded">${house['房屋户型'] || '未知户型'}</span>
                                    <span class="px-2 py-1 bg-gray-100 rounded">${house['所在区域'] || '未知区域'}</span>
                                    <span class="px-2 py-1 bg-gray-100 rounded">${house['装修情况'] || '未知装修'}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="openModal(${house.id})" class="flex-1 px-3 py-1 bg-blue-500 text-white text-sm rounded hover:bg-blue-600">
                                        编辑
                                    </button>
                                    <button onclick="deleteHouse(${house.id})" class="flex-1 px-3 py-1 bg-red-500 text-white text-sm rounded hover:bg-red-600">
                                        删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
                
                renderPagination(data);
            } catch (error) {
                container.innerHTML = '<div class="col-span-full text-center py-8 text-red-500">加载失败，请重试</div>';
                console.error('加载房源失败:', error);
            }
        }

        function renderPagination(data) {
            const pagination = document.getElementById('pagination');
            let html = '';
            
            if (data.page > 1) {
                html += `<button onclick="loadHouses(${data.page - 1})" class="px-3 py-1 border rounded hover:bg-gray-100">上一页</button>`;
            }
            
            html += `<span class="px-3 py-1">第 ${data.page} / ${data.total_pages} 页，共 ${data.total} 条</span>`;
            
            if (data.page < data.total_pages) {
                html += `<button onclick="loadHouses(${data.page + 1})" class="px-3 py-1 border rounded hover:bg-gray-100">下一页</button>`;
            }
            
            pagination.innerHTML = html;
        }

        function showTab(tab) {
            const listPanel = document.getElementById('list-panel');
            const predictPanel = document.getElementById('predict-panel');
            const tabList = document.getElementById('tab-list');
            const tabPredict = document.getElementById('tab-predict');
            
            if (tab === 'list') {
                listPanel.classList.remove('hidden');
                predictPanel.classList.add('hidden');
                tabList.classList.add('tab-active');
                tabPredict.classList.remove('tab-active');
                tabPredict.classList.add('text-gray-500');
            } else {
                listPanel.classList.add('hidden');
                predictPanel.classList.remove('hidden');
                tabPredict.classList.add('tab-active');
                tabList.classList.remove('tab-active');
                tabList.classList.add('text-gray-500');
            }
        }

        document.getElementById('predict-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('predict-btn');
            const resultDiv = document.getElementById('prediction-result');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 预测中...';
            resultDiv.classList.add('hidden');
            
            try {
                const formData = {
                    单价: parseFloat(document.getElementById('单价').value),
                    建筑面积: parseFloat(document.getElementById('建筑面积').value),
                    总楼层数: parseInt(document.getElementById('总楼层数').value),
                    室数: parseInt(document.getElementById('室数').value),
                    厅数: parseInt(document.getElementById('厅数').value),
                    卫数: parseInt(document.getElementById('卫数').value),
                    区: document.getElementById('区').value,
                    板块: document.getElementById('板块').value,
                    楼层位置: document.getElementById('楼层位置').value,
                    房屋朝向: document.getElementById('房屋朝向').value,
                    装修情况: document.getElementById('装修情况').value,
                    建筑类型: document.getElementById('建筑类型').value,
                    建筑结构: document.getElementById('建筑结构').value,
                    交易权属: document.getElementById('交易权属').value,
                    房屋用途: document.getElementById('房屋用途').value,
                    配备电梯: document.getElementById('配备电梯').value,
                    产权所属: document.getElementById('产权所属').value
                };
                
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('预测失败: ' + result.error);
                } else {
                    document.getElementById('predicted-price').textContent = '预测价格: ' + result.predicted_price_wan;
                    document.getElementById('model-used').textContent = '使用模型: ' + result.model_used;
                    resultDiv.classList.remove('hidden');
                }
            } catch (error) {
                alert('预测失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '预测价格';
            }
        });

        function openModal(houseId = null) {
            editingHouseId = houseId;
            const modal = document.getElementById('house-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('house-form');

            // 填充下拉选项
            populateFormSelects();

            if (houseId) {
                title.textContent = '编辑房源';
                loadHouseData(houseId);
            } else {
                title.textContent = '新增房源';
                form.reset();
                // 重置后恢复"请选择"占位
                document.querySelectorAll('#house-form select').forEach(sel => sel.selectedIndex = 0);
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // 用预测模型的特征选项填充表单中的下拉框
        function populateFormSelects() {
            const selectFields = ['区', '板块', '楼层位置', '房屋朝向', '装修情况', '建筑类型', '建筑结构', '配备电梯'];
            selectFields.forEach(field => {
                const select = document.getElementById(`form-${field}`);
                if (!select) return;
                // 保留第一个"请选择"option
                select.innerHTML = '<option value="">请选择</option>';
                if (featureOptions[field]) {
                    featureOptions[field].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.textContent = opt;
                        select.appendChild(option);
                    });
                }
            });
        }

        function closeModal() {
            const modal = document.getElementById('house-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            editingHouseId = null;
        }

        async function loadHouseData(houseId) {
            try {
                const response = await fetch(`/api/houses/${houseId}`);
                const house = await response.json();

                const fields = ['总价', '单价', '小区名称', '所在区域', '房屋户型', '建筑面积',
                               '所在楼层', '户型结构', '套内面积', '建筑类型', '房屋朝向',
                               '建筑结构', '装修情况', '梯户比例', '配备电梯', '区', '板块',
                               '楼层位置', '总楼层数', '室数', '厅数', '卫数'];

                const selectFields = ['区', '板块', '楼层位置', '房屋朝向', '装修情况', '建筑类型', '建筑结构', '配备电梯'];

                fields.forEach(field => {
                    const el = document.getElementById(`form-${field}`);
                    if (!el || house[field] === null || house[field] === undefined) return;

                    if (selectFields.includes(field)) {
                        // 下拉框：匹配option value
                        el.value = house[field];
                        if (el.value !== String(house[field])) {
                            // 如果选项中没有，追加一个
                            const opt = document.createElement('option');
                            opt.value = house[field];
                            opt.textContent = house[field];
                            el.appendChild(opt);
                            el.value = house[field];
                        }
                    } else {
                        el.value = house[field];
                    }
                });
            } catch (error) {
                console.error('加载房源数据失败:', error);
                alert('加载房源数据失败');
            }
        }

        async function saveHouse(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 保存中...';
            
            try {
                const fields = ['总价', '单价', '小区名称', '所在区域', '房屋户型', '建筑面积', 
                               '所在楼层', '户型结构', '套内面积', '建筑类型', '房屋朝向', 
                               '建筑结构', '装修情况', '梯户比例', '配备电梯', '区', '板块', 
                               '楼层位置', '总楼层数', '室数', '厅数', '卫数'];
                
                const formData = {};
                fields.forEach(field => {
                    const input = document.getElementById(`form-${field}`);
                    if (input && input.value) {
                        formData[field] = input.value;
                    }
                });
                
                let url = '/api/houses';
                let method = 'POST';
                
                if (editingHouseId) {
                    url = `/api/houses/${editingHouseId}`;
                    method = 'PUT';
                }
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '保存失败');
                }
                
                closeModal();
                loadHouses(currentPage);
                alert('保存成功！');
            } catch (error) {
                console.error('保存房源失败:', error);
                alert('保存失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '保存';
            }
        }

        async function deleteHouse(houseId) {
            if (!confirm('确定要删除这条房源吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/houses/${houseId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '删除失败');
                }
                
                loadHouses(currentPage);
                alert('删除成功！');
            } catch (error) {
                console.error('删除房源失败:', error);
                alert('删除失败: ' + error.message);
            }
        }

        document.getElementById('house-form').addEventListener('submit', saveHouse);

        document.addEventListener('DOMContentLoaded', function() {
            loadDistricts();
            loadFeatureOptions();
            loadHouses(1);
        });
    </script>
</body>
</html>
